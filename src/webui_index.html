<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Weave — 链上衍生宇宙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:32px 20px}

/* Header */
header{text-align:center;padding:48px 0 32px;border-bottom:1px solid #1a1a2e;margin-bottom:32px}
.logo{font-size:3em;margin-bottom:8px}
h1{font-size:2.4em;font-weight:900;background:linear-gradient(135deg,#4ade80,#22d3ee,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:#666;font-size:0.95em;margin-top:6px}

/* IP Selector */
.selector{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px;justify-content:center}
.selector select{padding:12px 20px;border-radius:10px;border:1px solid #333;background:#111;color:#e0e0e0;font-size:1em;min-width:240px;cursor:pointer}
.selector select:focus{outline:none;border-color:#22d3ee}
.btn-run{padding:12px 32px;border-radius:10px;border:none;background:linear-gradient(135deg,#22d3ee,#a78bfa);color:#000;font-weight:700;font-size:1em;cursor:pointer;transition:all .3s}
.btn-run:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,211,238,0.3)}
.btn-run:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-open{padding:12px 24px;border-radius:10px;border:1px solid #333;background:transparent;color:#e0e0e0;font-size:0.9em;cursor:pointer;display:none}

/* Status */
.status{background:#111;border:1px solid #222;border-radius:14px;padding:20px 24px;margin-bottom:24px;min-height:60px}
.status-idle{color:#666}
.status-running{color:#22d3ee}
.status-done{color:#4ade80}
.step{color:#888;font-size:0.9em;margin:4px 0;padding:4px 0;border-bottom:1px solid #0d0d1a}
.step .emoji{margin-right:6px}
.step .time{color:#444;font-size:0.85em;margin-left:8px}

/* Results */
.results{display:none}
.tabs{display:flex;gap:2px;margin-bottom:0;background:#111;border:1px solid #222;border-radius:14px 14px 0 0;overflow:hidden}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;background:transparent;color:#666;border:none;font-size:0.9em;transition:all .2s}
.tab:hover{background:#1a1a2e;color:#aaa}
.tab.active{background:#1a1a2e;color:#22d3ee;font-weight:700}
.tab-content{display:none;background:#0d0d1a;border:1px solid #222;border-top:none;border-radius:0 0 14px 14px;padding:24px}
.tab-content.active{display:block}
.tab-content iframe{width:100%;height:500px;border:none;border-radius:8px;background:#0a0a0f}
.tab-content .placeholder{text-align:center;padding:60px 20px;color:#444}

/* Footer */
footer{text-align:center;padding:32px;color:#333;font-size:0.8em}

/* Loading spinner */
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top:2px solid #22d3ee;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle}
</style>
</head>
<body>
<div class="container">

<header>
<div class="logo">🧬</div>
<h1>IP Weave</h1>
<div class="tagline">链上衍生宇宙 · 基于 GLM-5.1 的自治创作 Agent</div>
</header>

<div class="selector">
<select id="ipSelect">
<option value="pepe">🐸 Pepe the Frog</option>
<option value="bayc">🦧 Bored Ape Yacht Club</option>
<option value="punk">👤 CryptoPunks</option>
<option value="azuki">🌸 Azuki</option>
</select>
<button class="btn-run" id="btnRun" onclick="runAgent()">🚀 运行 Agent</button>
<button class="btn-open" id="btnOpen" onclick="openOutput()">📂 打开成果</button>
</div>

<div class="status" id="status">
<div class="status-idle">💡 选择一个 IP，点击「运行 Agent」开始</div>
</div>

<div class="results" id="results">
<div class="tabs">
<button class="tab active" onclick="switchTab('story',this)">📖 衍生故事</button>
<button class="tab" onclick="switchTab('script',this)">🎬 动画脚本</button>
<button class="tab" onclick="switchTab('assets',this)">🧸 周边资产</button>
<button class="tab" onclick="switchTab('visuals',this)">🎨 视觉图形</button>
</div>
<div class="tab-content active" id="tab-story">
<div class="placeholder">等待 Agent 生成...</div>
</div>
<div class="tab-content" id="tab-script">
<div class="placeholder">等待 Agent 生成...</div>
</div>
<div class="tab-content" id="tab-assets">
<div class="placeholder">等待 Agent 生成...</div>
</div>
<div class="tab-content" id="tab-visuals">
<div class="placeholder">等待 Agent 生成...</div>
</div>
</div>

<footer>
Perceive → Plan → Execute → Reflect → Iterate → Deliver<br>
Casual Hackathon · Z.AI 赛道
</footer>

</div>

<script>
let outputPrefix = "";
let currentOutputDir = "";

function runAgent() {
    const ip = document.getElementById("ipSelect").value;
    const btn = document.getElementById("btnRun");
    btn.disabled = true;
    btn.textContent = "⏳ 运行中...";

    document.getElementById("results").style.display = "none";
    document.getElementById("btnOpen").style.display = "none";

    const status = document.getElementById("status");
    status.innerHTML = '<div class="status-running"><span class="spinner"></span>Agent 启动中...</div>';

    // 轮询获取最新输出
    const steps = [
        "📋 [1/6] 读取链上 IP 数据...",
        "📋 [2/6] GLM-5.1 分析风格指纹...",
        "📋 [3/6] GLM-5.1 制定创作计划...",
        "📋 [4/6] GLM-5.1 执行创作...",
        "📋 [5/6] GLM-5.1 风格一致性检查...",
        "✅ [6/6] 全部通过！交付中..."
    ];
    let stepIdx = 0;
    const statusInterval = setInterval(() => {
        if (stepIdx < steps.length) {
            status.innerHTML += `<div class="step">${steps[stepIdx]} <span class="time">${new Date().toLocaleTimeString()}</span></div>`;
            stepIdx++;
        }
    }, 8000);

    // 发送请求
    fetch("/api/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ip: ip})
    }).then(r => r.json()).then(data => {
        // 等 Agent 跑完
        setTimeout(() => {
            clearInterval(statusInterval);
            status.innerHTML += `<div class="step" style="color:#4ade80">✅ Agent 全部完成！</div>`;

            // 加载成果
            const ipName = {"pepe":"Pepe__Frog","bayc":"Bored_Ape_Yacht_Club","punk":"CryptoPunks","azuki":"Azuki"}[ip];
            currentOutputDir = `output/${ipName}/visuals/index.html`;
            outputPrefix = `output/${ipName}`;

            document.getElementById("tab-story").innerHTML = `<iframe src="/output/${ipName}/story.html"></iframe>`;
            document.getElementById("tab-script").innerHTML = `<iframe src="/output/${ipName}/script.html"></iframe>`;
            document.getElementById("tab-assets").innerHTML = `<iframe src="/output/${ipName}/assets.html"></iframe>`;
            document.getElementById("tab-visuals").innerHTML = `<iframe src="/output/${ipName}/visuals/index.html"></iframe>`;

            document.getElementById("results").style.display = "block";
            document.getElementById("btnOpen").style.display = "inline-block";

            btn.disabled = false;
            btn.textContent = "🚀 运行 Agent";
        }, 10000);
    });
}

function switchTab(name, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + name).classList.add("active");
}

function openOutput() {
    if (currentOutputDir) {
        window.open(window.location.origin + "/output/" + currentOutputDir);
    }
}
</script>
</body>
</html>
